name: Windows EXE Üret

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install pytubefix certifi pyinstaller

      - name: ffmpeg indir
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp
          $ffmpeg = Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpeg.FullName -Destination ffmpeg.exe
          Remove-Item ffmpeg.zip, ffmpeg_tmp -Recurse -Force

      - name: EXE üret (PyInstaller)
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --windowed `
            --clean `
            --name "YouTube Indirici" `
            --add-binary "ffmpeg.exe;." `
            --hidden-import certifi `
            --hidden-import pytubefix `
            --collect-all pytubefix `
            --collect-all certifi `
            app.py

      - name: Inno Setup kur
        shell: pwsh
        run: |
          $url = "https://jrsoftware.org/download.php/is.exe"
          Invoke-WebRequest -Uri $url -OutFile innosetup.exe -UseBasicParsing
          Start-Process -FilePath innosetup.exe -ArgumentList "/VERYSILENT /NORESTART" -Wait

      - name: Setup EXE üret (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer.iss

      - name: Setup EXE'yi artifact olarak kaydet
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Indirici-Setup
          path: setup_output/YouTube_Indirici_Setup.exe
          retention-days: 30
