name: Windows EXE Üret

on:
  workflow_dispatch:  # Elle tetikleme (butona bas, çalışsın)
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest  # GitHub'ın Windows sunucusu

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install pytubefix certifi pyinstaller

      - name: ffmpeg indir (exe yanına göm)
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp
          $ffmpeg = Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpeg.FullName -Destination ffmpeg.exe
          Remove-Item ffmpeg.zip, ffmpeg_tmp -Recurse -Force
        shell: pwsh

      - name: EXE üret (PyInstaller)
        run: |
          pyinstaller `
            --noconfirm `
            --windowed `
            --clean `
            --name "YouTube Indirici" `
            --add-binary "ffmpeg.exe;." `
            --hidden-import certifi `
            --hidden-import pytubefix `
            app.py
        shell: pwsh

      - name: EXE'yi artifact olarak kaydet
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Indirici-Windows
          path: dist/YouTube Indirici/
          retention-days: 30
